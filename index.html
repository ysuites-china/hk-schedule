// ════════════════════════════════════════════════════════════════════════════

// ════════════════════════════════════════════════════════════════════════════
function setBoot(title, msg, opts) {
  document.getElementById('bootTitle').textContent = title;
  document.getElementById('bootMsg').innerHTML = msg;
  const sp = document.getElementById('bootSpinner');
  const actions = document.getElementById('bootActions');
  const errBox = document.getElementById('bootErr');
  sp.style.display = (opts && opts.spinner === false) ? 'none' : 'block';
  actions.innerHTML = (opts && opts.actions) || '';
  if (opts && opts.err) { errBox.style.display = 'block'; errBox.textContent = opts.err; }
  else errBox.style.display = 'none';
}

function bootErr(title, err) {
  setBoot(title, '请检查 CONFIG 配置或网络后重试。', {
    spinner: false,
    actions: '<button class="ms-signin-btn" onclick="location.reload()">重新加载</button>',
    err: (err && err.message) || JSON.stringify(err),
  });
}

function showApp() {
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('mainHeader').style.display = 'flex';
  document.getElementById('syncBar').style.display = 'flex';
  document.getElementById('legendBar').style.display = 'flex';
  document.getElementById('calWrap').style.display = 'block';
}

function setSyncUI(status, msg) {
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncText');
  dot.className = 'sync-dot ' + (status === 'ok' ? 'ok' : status === 'busy' ? 'busy' : status === 'err' ? 'err' : '');

}

async function initAuth() {
  try {
    if (CONFIG.clientId.startsWith('__') || CONFIG.tenantId.startsWith('__') || CONFIG.fileShareUrl.startsWith('__')) {
      bootErr('CONFIG 未填写完整', new Error('请先按部署指南填写 CONFIG.clientId / tenantId / fileShareUrl。'));
      return;
    }
    if (typeof msal === 'undefined') {
      bootErr('MSAL.js 加载失败', new Error('CDN 无法访问。请检查网络或公司代理是否屏蔽了 jsdelivr/msauth.net。'));
      return;
    }
    msalApp = new msal.PublicClientApplication(msalConfig);
    await msalApp.initialize();

  // 处理 redirect 回调
  try {
    const resp = await msalApp.handleRedirectPromise();
    if (resp && resp.account) account = resp.account;
  } catch (e) { bootErr('登录回调失败', e); return; }

  // 检查是否已有缓存的账户
  if (!account) {
    const accs = msalApp.getAllAccounts();
    if (accs.length > 0) account = accs[0];
  }

  if (!account) {
    setBoot('需要登录 Microsoft 365', '使用你的公司账号登录以访问 SharePoint Excel 数据。', {
      spinner: false,
      actions: '<button class="ms-signin-btn" onclick="signIn()"><svg class="ms-logo" viewBox="0 0 23 23"><rect x="1" y="1" width="10" height="10" fill="#f25022"/><rect x="12" y="1" width="10" height="10" fill="#7fba00"/><rect x="1" y="12" width="10" height="10" fill="#00a4ef"/><rect x="12" y="12" width="10" height="10" fill="#ffb900"/></svg>使用 Microsoft 账户登录</button>',
    });
    return;
  }

    document.getElementById('userChip').textContent = '👤 ' + (account.username || account.name);
    await bootstrap();
  } catch (e) { bootErr('启动失败', e); }
}

async function signIn() {
  try { await msalApp.loginRedirect({ scopes: SCOPES }); }
  catch (e) { bootErr('登录失败', e); }
}

function signOut() {
  if (msalApp && account) {
    msalApp.logoutRedirect({ account, postLogoutRedirectUri: msalConfig.auth.redirectUri });
  }
}

async function getToken() {
  if (!msalApp || !account) throw new Error('未登录');
  try {
    const r = await msalApp.acquireTokenSilent({ scopes: SCOPES, account });
    return r.accessToken;
  } catch (e) {
    if (e instanceof msal.InteractionRequiredAuthError) {
      await msalApp.acquireTokenRedirect({ scopes: SCOPES });
    }
    throw e;
  }
}

// ════════════════════════════════════════════════════════════════════════════
// Graph API 封装
// ════════════════════════════════════════════════════════════════════════════
async function gfetch(path, opts) {
  const token = await getToken();
  const url = path.startsWith('http') ? path : GRAPH + path;
  const res = await fetch(url, {
    ...opts,
    headers: {
      'Authorization': 'Bearer ' + token,
      'Content-Type': 'application/json',
      ...(opts && opts.headers),
    },
  });
  if (!res.ok) {
    let detail = '';
    try { detail = JSON.stringify(await res.json()); } catch {}
    throw new Error(`Graph ${res.status}: ${detail || res.statusText}`);
  }
  if (res.status === 204) return null;
  return res.json();
}

// 把分享链接编码成 Graph API 的 shareId
function encodeShareUrl(url) {
  const b64 = btoa(unescape(encodeURIComponent(url)));
  return 'u!' + b64.replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

// 解析 drive + item ID (通过分享链接)
async function resolveLocation() {
  const shareId = encodeShareUrl(CONFIG.fileShareUrl);
  const item = await gfetch(`/shares/${shareId}/driveItem`);
  driveId = item.parentReference && item.parentReference.driveId;
  itemId = item.id;
  if (!driveId || !itemId) throw new Error('无法从分享链接解析出 driveId/itemId');
}

// 文件 / 工作簿基础 URL
function wbBase() { return `/drives/${driveId}/items/${itemId}/workbook`; }

// 检查表是否存在
async function tableExists(tableName) {
  try { await gfetch(`${wbBase()}/tables/${encodeURIComponent(tableName)}`); return true; }
  catch (e) { if (String(e.message).includes('404') || String(e.message).includes('ItemNotFound')) return false; throw e; }
}

async function worksheetExists(name) {
  try { await gfetch(`${wbBase()}/worksheets/${encodeURIComponent(name)}`); return true; }
  catch (e) { if (String(e.message).includes('404') || String(e.message).includes('ItemNotFound')) return false; throw e; }
}

// 首次初始化：在空 xlsx 中创建两张表
async function initWorkbook() {
  setSyncUI('busy', '正在初始化 Excel 表结构…');

  // Bookings 表 (用默认 Sheet1)
  if (!(await tableExists(CONFIG.bookingsTable))) {
    const sheets = await gfetch(`${wbBase()}/worksheets`);
    const firstSheet = sheets.value[0].name;
    // 写入表头
    const range = `A1:${String.fromCharCode(64 + BOOK_COLS.length)}1`;
    await gfetch(`${wbBase()}/worksheets/${encodeURIComponent(firstSheet)}/range(address='${range}')`, {
      method: 'PATCH', body: JSON.stringify({ values: [BOOK_COLS] }),
    });
    // 建表
    const t = await gfetch(`${wbBase()}/worksheets/${encodeURIComponent(firstSheet)}/tables/add`, {
      method: 'POST', body: JSON.stringify({ address: `${firstSheet}!${range}`, hasHeaders: true }),
    });
    // 重命名
    await gfetch(`${wbBase()}/tables/${t.id}`, {
      method: 'PATCH', body: JSON.stringify({ name: CONFIG.bookingsTable }),
    });
  }

  // Overrides 表 (独立 sheet)
  if (!(await tableExists(CONFIG.overridesTable))) {
    if (!(await worksheetExists(CONFIG.overridesSheet))) {
      await gfetch(`${wbBase()}/worksheets/add`, {
        method: 'POST', body: JSON.stringify({ name: CONFIG.overridesSheet }),
      });
    }
    const range = `A1:${String.fromCharCode(64 + OVR_COLS.length)}1`;
    await gfetch(`${wbBase()}/worksheets/${encodeURIComponent(CONFIG.overridesSheet)}/range(address='${range}')`, {
      method: 'PATCH', body: JSON.stringify({ values: [OVR_COLS] }),
    });
    const t = await gfetch(`${wbBase()}/worksheets/${encodeURIComponent(CONFIG.overridesSheet)}/tables/add`, {
      method: 'POST', body: JSON.stringify({ address: `${CONFIG.overridesSheet}!${range}`, hasHeaders: true }),
    });
    await gfetch(`${wbBase()}/tables/${t.id}`, {
      method: 'PATCH', body: JSON.stringify({ name: CONFIG.overridesTable }),
    });
  }
}

// ════════════════════════════════════════════════════════════════════════════
// 数据加载 / 写入
// ════════════════════════════════════════════════════════════════════════════
async function fetchTableRows(tableName) {
  // 一次性拉全部行；Graph 默认分页可能截断，使用 $top + nextLink
  let rows = [];
  let url = `${wbBase()}/tables/${encodeURIComponent(tableName)}/rows?$top=2000`;
  while (url) {
    const resp = await gfetch(url);
    rows = rows.concat(resp.value || []);
    url = resp['@odata.nextLink'] || null;
  }
  return rows;
}

async function loadAll() {
  setSyncUI('busy', '正在从 Excel 拉取数据…');
  const [bk, ov] = await Promise.all([
    fetchTableRows(CONFIG.bookingsTable),
    fetchTableRows(CONFIG.overridesTable),
  ]);

  bookRowsCache = bk.map(r => ({
    rowIndex: r.index,
    id:      r.values[0][0],
    date:    r.values[0][1],
    name:    r.values[0][2],
    time:    r.values[0][3],
    contact: r.values[0][4],
    source:  r.values[0][5],
    notes:   r.values[0][6],
    ts:      r.values[0][7],
  }));
  ovrRowsCache = ov.map(r => ({
    rowIndex: r.index,
    date: r.values[0][0],
    name: r.values[0][1],
  }));

  // 转换为业务结构
  BK = {};
  for (const r of bookRowsCache) {
    if (!r.date) continue;
    if (!BK[r.date]) BK[r.date] = [];
    BK[r.date].push({ _id: r.id, name: r.name, time: r.time, contact: r.contact, source: r.source, notes: r.notes, ts: r.ts });
  }
  OV = {};
  for (const r of ovrRowsCache) { if (r.date) OV[r.date] = r.name; }

  const now = new Date();
  setSyncUI('ok', `已同步 · ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`);
}

async function addBookingRow(b) {
  setSyncUI('busy', '正在保存预约…');
  const row = [[b._id, b.date, b.name, b.time, b.contact, b.source, b.notes, b.ts]];
  const resp = await gfetch(`${wbBase()}/tables/${encodeURIComponent(CONFIG.bookingsTable)}/rows/add`, {
    method: 'POST', body: JSON.stringify({ values: row }),
  });
  bookRowsCache.push({ rowIndex: resp.index, ...b });
  setSyncUI('ok', '已保存');
}

async function deleteBookingRow(bookingId) {
  setSyncUI('busy', '正在删除…');
  // 先刷新 rowIndex（其它人删除会让索引漂移）
  const rows = await fetchTableRows(CONFIG.bookingsTable);
  const target = rows.find(r => r.values[0][0] === bookingId);
  if (!target) throw new Error('未找到对应行，请刷新');
  await gfetch(`${wbBase()}/tables/${encodeURIComponent(CONFIG.bookingsTable)}/rows/itemAt(index=${target.index})`, {
    method: 'DELETE',
  });
  setSyncUI('ok', '已删除');
}

async function updateBookingNotes(bookingId, newNotes) {
  setSyncUI('busy', '正在保存…');
  const rows = await fetchTableRows(CONFIG.bookingsTable);
  const target = rows.find(r => r.values[0][0] === bookingId);
  if (!target) throw new Error('未找到对应行，请刷新');
  // 列 G (index 6) = 跟进备注
  const newValues = [...target.values[0]]; newValues[6] = newNotes;
  await gfetch(`${wbBase()}/tables/${encodeURIComponent(CONFIG.bookingsTable)}/rows/itemAt(index=${target.index})`, {
    method: 'PATCH', body: JSON.stringify({ values: [newValues] }),
  });
  setSyncUI('ok', '已保存');
}

async function setOverride(dateStr, memberName) {
  setSyncUI('busy', '正在保存负责人…');
  const rows = await fetchTableRows(CONFIG.overridesTable);
  const existing = rows.find(r => r.values[0][0] === dateStr);
  if (existing) {
    await gfetch(`${wbBase()}/tables/${encodeURIComponent(CONFIG.overridesTable)}/rows/itemAt(index=${existing.index})`, {
      method: 'PATCH', body: JSON.stringify({ values: [[dateStr, memberName]] }),
    });
  } else {
    await gfetch(`${wbBase()}/tables/${encodeURIComponent(CONFIG.overridesTable)}/rows/add`, {
      method: 'POST', body: JSON.stringify({ values: [[dateStr, memberName]] }),
    });
  }
  setSyncUI('ok', '已保存');
}

// ════════════════════════════════════════════════════════════════════════════
// 启动序列
// ════════════════════════════════════════════════════════════════════════════
async function bootstrap() {
  try {
    setBoot('正在解析文件位置…', '通过分享链接查找 Excel…');
    await resolveLocation();
  } catch (e) {
    bootErr('无法访问 Excel 文件', e);
    return;
  }

  // 检查表结构
  try {
    setBoot('检查 Excel 表结构…', '');
    const [hasB, hasO] = await Promise.all([
      tableExists(CONFIG.bookingsTable),
      tableExists(CONFIG.overridesTable),
    ]);
    if (!hasB || !hasO) {
      setBoot('Excel 尚未初始化', `检测到文件已存在但缺少表结构。点击下方按钮，自动创建 <b>${CONFIG.bookingsTable}</b> 和 <b>${CONFIG.overridesTable}</b> 两张表。<br><br>(只需执行一次)`, {
        spinner: false,
        actions: '<button class="init-btn" onclick="runInit()">⚙️ 初始化表结构</button>',
      });
      return;
    }
  } catch (e) { bootErr('检查表结构失败', e); return; }

  // 拉数据
  try {
    setBoot('正在加载排班数据…', '');
    await loadAll();
  } catch (e) { bootErr('加载数据失败', e); return; }

  showApp();
  renderLegend();
  buildCal();
}

async function runInit() {
  try {
    setBoot('正在初始化…', '正在创建 Bookings 和 Overrides 表…');
    await initWorkbook();
    await bootstrap();
  } catch (e) { bootErr('初始化失败', e); }
}

async function manualRefresh() {
  try { await loadAll(); buildCal(); if (selD) renderM(); }
  catch (e) { setSyncUI('err', '刷新失败: ' + e.message); }
}

// ════════════════════════════════════════════════════════════════════════════
// 渲染：图例 + 日历 (与原版语义相同)
// ════════════════════════════════════════════════════════════════════════════
function renderLegend() {
  const seen = new Set();
  document.getElementById('lgd').innerHTML = MEMBERS
    .filter(m => { if (seen.has(m.name)) return false; seen.add(m.name); return true; })
    .map(m => `<div class="legend-item"><div class="legend-dot" style="background:${m.color}"></div>${m.name}</div>`)
    .join('');
}

function dkey(y,m,d){ return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }

function getMem(ds){
  if (OV[ds]) { const c=[...MEMBERS].reverse().find(x=>x.name===OV[ds]); return {name:OV[ds], color:c?c.color:'#888'}; }
  const dt=ld(ds);
  if (dt.getDay()===0 || dt.getDay()===6) return null;
  for (const m of MEMBERS) { if (dt>=ld(m.start) && dt<=ld(m.end)) return {name:m.name, color:m.color}; }
  return null;
}

function buildCal(){
  document.getElementById('mLabel').textContent = `${cY}年 ${MNAMES[cM]}`;
  const g = document.getElementById('calGrid');
  g.innerHTML = '';
  const offset = (new Date(cY,cM,1).getDay()+6)%7;
  const dim = new Date(cY,cM+1,0).getDate();
  const today = new Date();

  for (let i=0; i<offset; i++) { const e=document.createElement('div'); e.className='day-cell empty'; g.appendChild(e); }

  for (let d=1; d<=dim; d++) {
    const dt=new Date(cY,cM,d);
    const dow=dt.getDay();
    const isWE = dow===0 || dow===6;
    const key = dkey(cY,cM,d);
    const mem = getMem(key);
    const bks = BK[key] || [];
    const inR = dt>=RANGE_S && dt<=RANGE_E;
    const isT = dt.toDateString() === today.toDateString();

    const el = document.createElement('div');
    el.className = ['day-cell', isWE?'we':'', isT?'today':'', !inR?'oor':''].filter(Boolean).join(' ');

    let h = `<div class="day-num">${cM+1}/${d}</div>`;
    if (inR) {
      if (isWE) h += `<div class="we-note">自行调整</div>`;
      if (mem && !isWE) h += `<div class="mem-tag" style="background:${mem.color}">${mem.name}</div>`;
    } else {
      h += `<div style="font-size:10px;color:#ccc">排班外</div>`;
    }
    bks.slice(0,2).forEach(b => {
      const t = b.time ? `<span class="bk-chip-time">${b.time}</span>` : '';
      h += `<div class="bk-chip">${t}${b.name}</div>`;
    });
    if (bks.length > 2) h += `<div class="more-chip">+${bks.length-2} 更多</div>`;
    el.innerHTML = h;
    el.onclick = () => openModal(cY,cM,d);
    g.appendChild(el);
  }
}

async function prevM(){ if(--cM<0){cM=11;cY--;} buildCal(); try { await loadAll(); buildCal(); } catch(e){ setSyncUI('err','刷新失败'); } }
async function nextM(){ if(++cM>11){cM=0;cY++;} buildCal(); try { await loadAll(); buildCal(); } catch(e){ setSyncUI('err','刷新失败'); } }

// ════════════════════════════════════════════════════════════════════════════
// 详情弹窗
// ════════════════════════════════════════════════════════════════════════════
function openModal(y,m,d){
  selD = dkey(y,m,d); editDuty = false;
  const dt = new Date(y,m,d);
  document.getElementById('mT').textContent = `${y}年${m+1}月${d}日 ${DNAMES[dt.getDay()]}`;
  renderM();
  document.getElementById('ov').classList.add('open');
}

function renderM(){
  const mem = getMem(selD);
  const bks = BK[selD] || [];
  const seen = new Set();
  const uniq = MEMBERS.filter(m => { if (seen.has(m.name)) return false; seen.add(m.name); return true; });
  const selDt = ld(selD); const isSelWE = selDt.getDay()===0 || selDt.getDay()===6;

  const dutyH = mem
    ? `<div class="duty-box"><div class="duty-av" style="background:${mem.color}">${mem.name[0]}</div>
        <div><div class="duty-name">${mem.name}</div><div class="duty-sub">${isSelWE?'周末值班':'今日接待负责人'}</div></div></div>`
    : `<div style="padding:11px;background:#f8f9fa;border-radius:9px;color:#bbb;font-size:12px">${isSelWE?'周末 · 暂未指定负责人':'不在排班范围内'}</div>`;

  const pickerH = editDuty
    ? `<div class="mem-grid">${uniq.map(m => `<button class="mem-pick ${mem&&mem.name===m.name?'sel':''}" style="background:${m.color}" onclick="doSetDuty('${m.name}')">${m.name}</button>`).join('')}</div>
       <button class="ghost-btn" onclick="toggleED()">取消</button>`
    : `<button class="ghost-btn" onclick="toggleED()">✏️ 更换当天负责人</button>`;

  const bksH = bks.length
    ? bks.map((b,i) => `<div class="bk-item">
        <div class="bk-top">
          <div class="bk-name">👤 ${escapeHtml(b.name)}</div>
          <div style="display:flex;align-items:center;gap:4px">
            ${b.time?`<span class="bk-time-tag">${escapeHtml(b.time)}</span>`:''}
            <button class="del-btn" onclick="doDelBk(${i})">✕</button>
          </div>
        </div>
        ${b.contact||b.source?`<div class="bk-meta">${escapeHtml([b.contact,b.source].filter(Boolean).join(' · '))}</div>`:''}
        <div id="noteView_${i}">
          ${b.notes?`<div class="bk-notes-box">📝 ${escapeHtml(b.notes)}</div>`:'<div style="font-size:11px;color:#ccc;margin-top:2px">暂无跟进备注</div>'}
          <button class="ghost-btn" style="margin-top:5px;font-size:11px" onclick="editNote(${i})">✏️ ${b.notes?'编辑':'添加'}跟进备注</button>
        </div>
        <div id="noteEdit_${i}" style="display:none">
          <textarea class="bk-notes-edit" id="noteTA_${i}" placeholder="填写跟进备注...">${escapeHtml(b.notes||'')}</textarea>
          <button class="save-notes-btn" onclick="doSaveNote(${i})">保存</button>
          <button class="ghost-btn" style="margin-top:4px;font-size:11px" onclick="cancelNote(${i})">取消</button>
        </div>
      </div>`).join('')
    : `<div class="empty-bk">暂无预约记录，在下方添加</div>`;

  document.getElementById('mB').innerHTML = `
    <div class="sec-lbl">值班负责人</div>${dutyH}
    <div style="margin-bottom:4px">${pickerH}</div>
    <div class="sec-lbl">看房预约记录</div>
    <div style="margin-bottom:8px">${bksH}</div>
    <div class="add-form">
      <div class="add-title">＋ 新增预约</div>
      <div class="f-row"><label class="f-lbl">客户姓名 *</label><input class="f-in" id="fN" placeholder="如：李先生 / Ms Chan"/></div>
      <div class="f-2col">
        <div class="f-row" style="margin-bottom:0"><label class="f-lbl">预约时间</label><input class="f-in" id="fT" placeholder="如：14:00"/></div>
        <div class="f-row" style="margin-bottom:0"><label class="f-lbl">联系方式</label><input class="f-in" id="fC" placeholder="电话/WhatsApp"/></div>
      </div>
      <div class="f-row" style="margin-top:9px"><label class="f-lbl">来源 / 需求</label><input class="f-in" id="fS" placeholder="如：Awehome咨询 / 带家长看房 / 意向Studio"/></div>
      <div class="f-row"><label class="f-lbl">跟进备注</label><textarea class="f-in" id="fO" placeholder="带看反馈、意向程度、后续跟进..."></textarea></div>
      <button class="save-btn" onclick="doAddBk()">✓ 保存预约</button>
    </div>`;
}

function escapeHtml(s) {
  return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function toggleED(){ editDuty=!editDuty; renderM(); }

async function doSetDuty(n) {
  try {
    OV[selD] = n;
    editDuty = false;
    renderM(); buildCal();
    await setOverride(selD, n);
  } catch (e) { setSyncUI('err', '保存失败: ' + e.message); alert('保存失败: ' + e.message); }
}

function editNote(i){ document.getElementById(`noteView_${i}`).style.display='none'; document.getElementById(`noteEdit_${i}`).style.display='block'; document.getElementById(`noteTA_${i}`).focus(); }
function cancelNote(i){ document.getElementById(`noteView_${i}`).style.display='block'; document.getElementById(`noteEdit_${i}`).style.display='none'; }

async function doSaveNote(i) {
  const b = BK[selD][i];
  const newNotes = document.getElementById(`noteTA_${i}`).value.trim();
  try {
    await updateBookingNotes(b._id, newNotes);
    b.notes = newNotes;
    renderM(); buildCal();
  } catch (e) { setSyncUI('err','保存失败'); alert('保存失败: ' + e.message); }
}

async function doAddBk() {
  const nm = document.getElementById('fN').value.trim();
  if (!nm) { alert('请填写客户姓名'); return; }
  const b = {
    _id: crypto.randomUUID(),
    date: selD,
    name: nm,
    time:    document.getElementById('fT').value.trim(),
    contact: document.getElementById('fC').value.trim(),
    source:  document.getElementById('fS').value.trim(),
    notes:   document.getElementById('fO').value.trim(),
    ts: new Date().toISOString(),
  };
  try {
    await addBookingRow({ _id:b._id, date:b.date, name:b.name, time:b.time, contact:b.contact, source:b.source, notes:b.notes, ts:b.ts });
    if (!BK[selD]) BK[selD] = [];
    BK[selD].push(b);
    renderM(); buildCal();
  } catch (e) { setSyncUI('err','保存失败'); alert('保存失败: ' + e.message); }
}

async function doDelBk(i) {
  if (!confirm('确认删除这条预约？')) return;
  const b = BK[selD][i];
  try {
    await deleteBookingRow(b._id);
    BK[selD].splice(i,1);
    renderM(); buildCal();
  } catch (e) { setSyncUI('err','删除失败'); alert('删除失败: ' + e.message); }
}

function closeModal(){ document.getElementById('ov').classList.remove('open'); selD=null; }
function closeOv(e){ if (e.target.id==='ov') closeModal(); }

// ════════════════════════════════════════════════════════════════════════════
// 汇总面板
// ════════════════════════════════════════════════════════════════════════════
function openSummary(){ renderSummary(); document.getElementById('sumOv').classList.add('open'); }
function closeSummary(){ document.getElementById('sumOv').classList.remove('open'); }
function closeSumOv(e){ if (e.target.id==='sumOv') closeSummary(); }

function renderSummary(){
  const keys = Object.keys(BK).filter(k => BK[k] && BK[k].length>0).sort();
  const total = keys.reduce((s,k) => s+BK[k].length, 0);
  document.getElementById('sumSub').textContent = total ? `共 ${total} 条预约 · ${keys.length} 天` : '暂无预约记录';
  if (!keys.length) {
    document.getElementById('sumBody').innerHTML = `<div class="sum-empty">🗓️<br><br>暂无预约记录<br><span style="font-size:12px">点击日历格子添加预约</span></div>`;
    return;
  }
  document.getElementById('sumBody').innerHTML = keys.map(k => {
    const [y,m,d] = k.split('-').map(Number);
    const dt = new Date(y,m-1,d);
    const mem = getMem(k);
    return `<div class="sum-day">
      <div class="sum-day-header">
        <div class="sum-day-date">${parseInt(m)}月${parseInt(d)}日 ${DNAMES[dt.getDay()]}</div>
        ${mem?`<span class="sum-day-mem" style="background:${mem.color}">${mem.name}</span>`:''}
      </div>
      ${BK[k].map(b => `<div class="sum-bk">
        <div class="sum-bk-top"><div class="sum-bk-name">👤 ${escapeHtml(b.name)}</div>${b.time?`<span class="sum-bk-time">${escapeHtml(b.time)}</span>`:''}</div>
        ${b.contact||b.source?`<div class="sum-bk-meta">${escapeHtml([b.contact,b.source].filter(Boolean).join(' · '))}</div>`:''}
        ${b.notes?`<div class="sum-bk-notes">📝 ${escapeHtml(b.notes)}</div>`:''}
      </div>`).join('')}
    </div>`;
  }).join('');
}

document.addEventListener('keydown', e => { if (e.key==='Escape') { closeModal(); closeSummary(); } });

// 启动
initAuth();
</script>
</body>
</html>
